specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Crowdfunding
    network: sepolia
    source:
      address: "0x25970Fdf1132071C5a878972357B9F371B2d2679"
      abi: Crowdfunding
      startBlock: 10825971 
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Donation
      abis:
        - name: Crowdfunding
          file: ./abis/Crowdfunding.json
      eventHandlers:
        # Updated signature to match the new contract's expanded event
        - event: CampaignCreated(indexed uint256,address,string,string,string,string[],uint256,uint256)
          handler: handleCampaignCreated
        - event: Donated(indexed uint256,indexed address,uint256,uint256)
          handler: handleDonated
        - event: RefundClaimed(indexed uint256,indexed address,uint256)
          handler: handleRefundClaimed
        - event: Withdrawn(indexed uint256,uint256)
          handler: handleWithdrawn
      file: ./src/crowdfunding.ts