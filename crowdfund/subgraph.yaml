specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Crowdfunding
    network: sepolia
    source:
      address: "0x0B9daB30727503Af275abA2BB05bDA8DC5dDE302"
      abi: Crowdfunding
      startBlock: 10825971
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CampaignCreated
        - Donated
        - RefundClaimed
        - Withdrawn
      abis:
        - name: Crowdfunding
          file: ./abis/Crowdfunding.json
      eventHandlers:
        - event: CampaignCreated(indexed uint256,address,string,uint256)
          handler: handleCampaignCreated
        - event: Donated(indexed uint256,indexed address,uint256,uint256)
          handler: handleDonated
        - event: RefundClaimed(indexed uint256,indexed address,uint256)
          handler: handleRefundClaimed
        - event: Withdrawn(indexed uint256,uint256)
          handler: handleWithdrawn
      file: ./src/crowdfunding.ts
