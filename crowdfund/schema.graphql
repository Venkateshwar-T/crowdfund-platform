enum CampaignStatus {
  Active
  Successful
  Failed
}

type Campaign @entity(immutable: false) {
  id: ID!
  slug: String! @index
  owner: Bytes!
  title: String!
  description: String!
  additionalNotes: String
  category: String!
  target: BigInt!
  deadline: BigInt!
  amountCollectedUsd: BigInt!
  ethRaised: BigInt!
  withdrawn: Boolean!
  status: CampaignStatus!
  mediaUrls: [String!]!
  donations: [Donation!]! @derivedFrom(field: "campaign")
}

type Donation @entity(immutable: false) {
  id: ID!
  campaign: Campaign!
  donator: Bytes!
  amountEth: BigInt!
  amountUsd: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}
