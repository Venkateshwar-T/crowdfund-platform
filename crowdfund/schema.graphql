type CampaignCreated @entity(immutable: true) {
  id: Bytes!
  internal_id: BigInt! # uint256
  owner: Bytes! # address
  title: String! # string
  target: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Donated @entity(immutable: true) {
  id: Bytes!
  internal_id: BigInt! # uint256
  donator: Bytes! # address
  amountEth: BigInt! # uint256
  amountUsd: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type RefundClaimed @entity(immutable: true) {
  id: Bytes!
  internal_id: BigInt! # uint256
  user: Bytes! # address
  amountEth: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Withdrawn @entity(immutable: true) {
  id: Bytes!
  internal_id: BigInt! # uint256
  amountEth: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
