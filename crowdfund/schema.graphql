enum CampaignStatus {
  Active
  Successful
  Failed
}

type Campaign @entity {
  id: ID!
  owner: Bytes!
  title: String!
  description: String!
  category: String!
  target: BigInt!
  deadline: BigInt!
  amountCollectedUsd: BigInt!
  ethRaised: BigInt!
  withdrawn: Boolean!
  status: CampaignStatus!
  mediaUrls: [String!]!
  donations: [Donation!]! @derivedFrom(field: "campaign")
}

type Donation @entity {
  id: ID!
  campaign: Campaign!
  donator: Bytes!
  amountEth: BigInt!
  amountUsd: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}
